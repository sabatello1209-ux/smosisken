<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOSMOSISKEN</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#010103;font-family:'Segoe UI',sans-serif;user-select:none;touch-action:none}
        
        canvas{display:block;margin:0 auto;width:100%;height:100vh;max-width:500px;object-fit:contain;box-shadow:0 0 50px rgba(0,150,255,.15)}
        
        #ui{position:absolute;top:20px;left:20px;color:#fff;font-size:18px;background:rgba(0,0,0,.8);padding:15px 25px;border-radius:12px;border:1px solid #00ffcc;pointer-events:none;z-index:20}
        #ui span{color:#ff007f;font-weight:700;font-size:24px}
        #ui-record{position:absolute;top:20px;right:180px;color:#fff;font-size:18px;background:rgba(0,0,0,.8);padding:15px 25px;border-radius:12px;border:1px solid #ffcc00;pointer-events:none;z-index:20}
        #ui-record span{color:#ffcc00;font-weight:700;font-size:24px}
        #ui-energy{position:absolute;top:80px;right:20px;color:#fff;font-size:18px;background:rgba(0,0,0,.8);padding:10px 20px;border-radius:12px;border:1px solid #33ff33;pointer-events:none;z-index:20}
        #ui-energy span{color:#33ff33;font-weight:700;font-size:24px}
        
        #jump-indicator{position:absolute;bottom:120px;right:20px;display:flex;flex-direction:column;gap:6px;pointer-events:none;z-index:20}
        .jump-dot{width:18px;height:18px;border-radius:50%;border:2px solid #fff;background:transparent;transition:background .15s,box-shadow .15s}
        .jump-dot.active{background:#00ffcc;box-shadow:0 0 10px #00ffcc}
        
        #progress-bar{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:8px;height:300px;background:rgba(255,255,255,.1);border-radius:4px;border:1px solid rgba(255,255,255,.2);pointer-events:none;z-index:20;overflow:hidden}
        #progress-fill{position:absolute;bottom:0;width:100%;background:linear-gradient(to top,#00ffcc,#ff007f);border-radius:4px;transition:height .3s;height:0%}
        #progress-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:9px;color:#aaa;white-space:nowrap}
        
        #combo-display{position:absolute;top:130px;left:20px;color:#ffcc00;font-size:22px;font-weight:700;background:rgba(0,0,0,.8);padding:8px 16px;border-radius:10px;border:1px solid #ffcc00;pointer-events:none;z-index:20;display:none;transition:opacity .3s}
        
        #leaderboard{margin-top:15px;text-align:left}
        #leaderboard h3{color:#00ffcc;font-size:14px;margin-bottom:8px;text-align:center}
        .lb-entry{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:13px;color:#ccc}
        .lb-entry:first-child .lb-name{color:#ffcc00}
        .lb-entry:nth-child(2) .lb-name{color:#aaa}
        .lb-entry:nth-child(3) .lb-name{color:#cd7f32}
        .lb-score{color:#00ffcc;font-weight:bold}

        #test-panel{position:absolute;top:110px;left:20px;z-index:30;display:flex;flex-direction:column;gap:8px}
        .test-btn{background:rgba(0,0,0,.8);color:#00bbff;border:1px solid #00bbff;padding:8px 15px;font-size:13px;border-radius:8px;cursor:pointer;transition:.2s;font-weight:700;text-align:left}
        .test-btn:hover{background:#00bbff;color:#000}
        #muteBtn{position:absolute;top:20px;right:20px;padding:10px 20px;background:rgba(0,0,0,.8);color:#fff;border:1px solid #00ffcc;cursor:pointer;border-radius:8px;z-index:20}
        
        #menu,#pause-menu{position:absolute;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:flex;justify-content:center;align-items:center;z-index:10}
        #pause-menu{display:none;z-index:50}
        #panel{background:#0a0510;border:2px solid #00ffcc;padding:30px 20px;border-radius:20px;text-align:center;color:#fff;max-width:500px;width:95%;max-height:90vh;overflow-y:auto}
        h1{color:#00ffcc;margin-bottom:15px;font-size:30px;letter-spacing:2px}
        h2{color:#fff;margin-bottom:25px;font-size:22px}
        p{color:#aaa;margin-bottom:20px;font-size:16px}
        .char-select{display:flex;justify-content:center;gap:8px;margin-bottom:20px;flex-wrap:wrap; max-width: 400px; margin-left: auto; margin-right: auto;}
        .char-btn{background:#111;color:#fff;border:2px solid #555;padding:8px 12px;border-radius:10px;cursor:pointer;transition:.3s;font-size:13px;font-weight:700}
        .char-btn.selected{border-color:#00ffcc;background:rgba(0,255,204,.2);box-shadow:0 0 10px #00ffcc}
        .start-btn{background:0 0;color:#ff007f;border:2px solid #ff007f;padding:12px 35px;font-size:18px;font-weight:700;border-radius:30px;cursor:pointer;transition:.3s; margin-top:5px;}
        .start-btn:hover{background:#ff007f;color:#fff;box-shadow:0 0 15px #ff007f}
        
        #share-btn{background:#ffcc00;color:#000;border:2px solid #ffcc00;display:none;}
        #share-btn:hover{background:0 0;color:#ffcc00;box-shadow:0 0 15px #ffcc00}
        
        .resume-btn{background:#00ffcc;color:#000;border:2px solid #00ffcc;padding:12px 30px;font-size:16px;font-weight:700;border-radius:30px;cursor:pointer;transition:.3s;margin-bottom:15px;display:none}
        .resume-btn:hover{background:0 0;color:#00ffcc;box-shadow:0 0 15px #00ffcc}
        .pause-btn-container{display:flex;gap:20px;justify-content:center}
        .btn-no,.btn-yes{padding:12px 35px;font-size:18px;font-weight:700;border-radius:20px;cursor:pointer;transition:.3s}
        .btn-yes{background:#00ffcc;color:#000;border:2px solid #00ffcc}
        .btn-yes:hover{background:0 0;color:#00ffcc;box-shadow:0 0 15px #00ffcc}
        .btn-no{background:0 0;color:#ff007f;border:2px solid #ff007f}
        .btn-no:hover{background:#ff007f;color:#fff;box-shadow:0 0 15px #ff007f}
        
        #touch-controls{position:absolute;bottom:30px;left:0;right:0;display:flex;justify-content:space-between;padding:0 40px;z-index:25;pointer-events:none}
        .touch-btn{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center;font-size:28px;pointer-events:all;cursor:pointer;user-select:none;-webkit-user-select:none;transition:all .2s; backdrop-filter: blur(2px);}
        .touch-btn:active,.touch-btn.pressed{background:rgba(255,255,255,0.25);color:rgba(255,255,255,1);transform:scale(0.92);}
        #touch-jump{width:75px;height:75px;font-size:34px;background:rgba(255,255,255,0.1);}
        #touch-jump:active,#touch-jump.pressed{background:rgba(255,255,255,0.3);transform:scale(0.92);}
        #touch-shoot{width:60px;height:60px;font-size:24px;background:rgba(0,255,204,0.15); border: 2px solid rgba(0,255,204,0.3); color: #00ffcc;}
        #touch-shoot:active,#touch-shoot.pressed{background:rgba(0,255,204,0.4);transform:scale(0.92);}
        #touch-fly{width:60px;height:60px;font-size:24px;background:rgba(51,255,51,0.15); border: 2px solid rgba(51,255,51,0.3); color: #33ff33;}
        #touch-fly:active,#touch-fly.pressed{background:rgba(51,255,51,0.4);transform:scale(0.92);}
        .touch-side-buttons{display:flex;gap:12px}
        .touch-action-buttons{display:flex;gap:12px; align-items:center;}
        
        #level-flash{position:absolute;inset:0;pointer-events:none;z-index:15;opacity:0;background:white}
        #spike-warning{position:absolute;inset:0;pointer-events:none;z-index:14;opacity:0;border:4px solid #ff0000;box-shadow:inset 0 0 80px rgba(255,0,0,.4)}
        
        #flight-bar-container { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); width:200px; height:12px; background:rgba(0,0,0,0.6); border-radius:6px; display:none; z-index:30; pointer-events:none; border: 2px solid #fff; box-shadow: 0 0 15px #00ffcc; }
        #flight-bar-fill { width:100%; height:100%; background:linear-gradient(to right, #00ffcc, #33ff33); border-radius:4px; transition: width 0.1s linear; }

        @media (max-width: 600px) {
            #ui-record, #jump-indicator, #progress-bar, #test-panel { display: none !important; }
            #ui { top: 15px; left: 15px; padding: 10px 15px; font-size: 16px; border-radius: 8px; }
            #ui span { font-size: 20px; }
            #ui-energy { top: 15px; right: 15px; padding: 10px 15px; font-size: 16px; border-radius: 8px; }
            #ui-energy span { font-size: 20px; }
            #combo-display { top: 70px; left: 15px; font-size: 18px; padding: 6px 12px; }
            #muteBtn { top: 70px; right: 15px; padding: 8px 15px; font-size: 12px; }
            #touch-controls{bottom: 15px; padding: 0 10px;}
            .touch-btn{width:55px;height:55px;font-size:20px;}
            #touch-jump{width:65px;height:65px;font-size:28px;}
            #touch-shoot{width:50px;height:50px;font-size:20px;}
            #touch-fly{width:50px;height:50px;font-size:20px;}
            .touch-action-buttons{gap: 8px;}
            .touch-side-buttons{gap: 8px;}
        }
    </style>
</head>
<body>
    <div id="ui">სიმაღლე: <span id="score">0</span> მ</div>
    <div id="ui-record">რეკორდი: <span id="high-score">0</span> მ</div>
    <div id="ui-energy">🟢 <span id="energy-count">0</span></div>
    <div id="combo-display">🔥 x<span id="combo-count">0</span></div>
    
    <div id="jump-indicator">
        <div class="jump-dot active" id="jump-dot-1"></div>
        <div class="jump-dot active" id="jump-dot-2"></div>
    </div>
    
    <div id="progress-bar">
        <div id="progress-fill"></div>
        <div id="progress-label">1550მ</div>
    </div>
    
    <div id="flight-bar-container">
        <div id="flight-bar-fill"></div>
    </div>
    
    <div id="test-panel">
        <button class="test-btn" onclick="teleportToSpace(300)">☁️ 300მ</button>
        <button class="test-btn" onclick="teleportToSpace(780)">⬇️ 780მ</button>
        <button class="test-btn" onclick="teleportToSpace(800)">🚀 800მ</button>
        <button class="test-btn" onclick="teleportToSpace(1050)">🪐 1050მ</button>
        <button class="test-btn" onclick="teleportToSpace(1200)">☄️ 1200მ</button>
        <button class="test-btn" onclick="teleportToSpace(1480)">🌌 1480მ</button>
        <button class="test-btn" onclick="teleportToSpace(1550)">👾 1550მ</button>
    </div>
    <button id="muteBtn" onclick="toggleMute()">ეფექტები: 🔊</button>
    
    <div id="level-flash"></div>
    <div id="spike-warning"></div>
    
    <div id="menu">
        <div id="panel">
            <h1 id="m-title">KOSMOSISKEN</h1>
            <button id="resume-btn" class="resume-btn" onclick="resumeFromSavedCheckpoint()">გაგრძელება</button>
            <p id="m-desc">აირჩიე პერსონაჟი</p>
            <div class="char-select">
                <button id="btn-astro" class="char-btn selected" onclick="selectCharacter('astro')">👨‍🚀 Astro</button>
                <button id="btn-shrek" class="char-btn" onclick="selectCharacter('shrek')">👹 Shrek</button>
                <button id="btn-mrgeorgia" class="char-btn" onclick="selectCharacter('mrgeorgia')">🇬🇪 Mr. Georgia</button>
                <button id="btn-messi" class="char-btn" onclick="selectCharacter('messi')">⚽ Messi</button>
                <button id="btn-spiderman" class="char-btn" onclick="selectCharacter('spiderman')">🕷️ Spider-Man</button>
                <button id="btn-batman" class="char-btn" onclick="selectCharacter('batman')">🦇 Batman</button>
                <button id="btn-goku" class="char-btn" onclick="selectCharacter('goku')">🐉 Goku</button>
                <button id="btn-rick" class="char-btn" onclick="selectCharacter('rick')">🧪 Rick</button>
                <button id="btn-sonic" class="char-btn" onclick="selectCharacter('sonic')">🦔 Sonic</button>
            </div>
            <p id="m-record" style="color: #ffcc00; font-weight: bold;"></p>
            <div id="leaderboard">
                <h3>🏆 TOP 5 შედეგი</h3>
                <div id="lb-list"></div>
            </div>
            <br>
            <button id="share-btn" class="start-btn" onclick="shareChallenge()">📤 მეგობრის გამოწვევა</button>
            <button class="start-btn" onclick="startGame()">ახალი თამაში</button>
        </div>
    </div>
    <div id="pause-menu">
        <div id="panel">
            <h2>გსურთ გაგრძელება?</h2>
            <div class="pause-btn-container">
                <button class="btn-yes" onclick="resumeGame()">კი</button>
                <button class="btn-no" onclick="quitGame()">არა</button>
            </div>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="touch-controls">
        <div class="touch-action-buttons">
            <div class="touch-btn" id="touch-fly">🚀</div>
        </div>
        <div class="touch-action-buttons">
            <div class="touch-btn" id="touch-shoot">🎯</div>
        </div>
    </div>
    <!-- iOS gyroscope permission button -->
    <button id="gyro-btn" onclick="requestGyro()" style="display:none;position:absolute;bottom:110px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#00ffcc;border:1px solid #00ffcc;padding:8px 18px;font-size:13px;border-radius:20px;z-index:30;cursor:pointer;">📡 გაიროსკოპი</button>

    <script>
        const TARGET_FPS = 60, TARGET_FRAME_TIME = 1000 / TARGET_FPS;
        let keys = {}, audioCtx = null, isMuted = false, spaceOsc = null, spaceGain = null, selectedChar = 'astro';
        let highScore = 0, savedCheckpointScore = null, checkpointLives = 0, energy = 0;
        let gameActive = false, isPaused = false, score = 0, cameraY = 0;
        let platforms = [], clouds = [], birds = [], balloons = [], rockets = [], capsules = [];
        let satellites = [], asteroids = [], shootingStars = [], chakrulos = [], alienPairs = [], bgHelicopters = [], airplanes = [];
        let bgUfos = [], floatingAliens = [], checkpoints = [], collectibles = [], activeCheckpoint = null, checkpointMessageTimer = 0, respawnMessageTimer = 0;
        let highestCloudY = 600 - (100 * 40), highestY = 600, nextAlienScore = 1580;
        let lastSpawnedSpike = false, lastSpawnedBreakable = false, lastSatelliteScore = 700, lastAsteroidScore = 1200;
        let chakruloSpawned = false, capsuleSpawned = false, lastRocketSpawn = 0, rocketTimerStarted = false;
        let lastTime = 0, deltaTime = 0, animationId = null, deathTimer = 0, deathReason = '';
        let bloodParticles = [], screenSplatters = [], lasers = [];
        
        let comboCount = 0, comboTimer = 0, lastLandScore = 0;
        let levelFlashTimer = 0, levelFlashThresholds = [300, 500, 800, 1050, 1200, 1550];
        let lastLevelFlash = 0;
        let spikeWarningAlpha = 0;
        let leaderboard = [];
        let idleTimer = 0; 
        
        let projectiles = [];
        let shootCooldown = 0;
        let explosionParticles = [];
        let flightTimer = 0; // ფრენის დრო
        
        let touchLeft = false, touchRight = false, touchJump = false;
        
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 750;

        function loadLeaderboard() {
            try { leaderboard = JSON.parse(localStorage.getItem('kosmosLeaderboard')) || []; } catch(e) { leaderboard = []; }
        }
        function saveLeaderboard(s) {
            loadLeaderboard();
            leaderboard.push(s);
            leaderboard.sort((a,b) => b - a);
            leaderboard = leaderboard.slice(0, 5);
            try { localStorage.setItem('kosmosLeaderboard', JSON.stringify(leaderboard)); } catch(e) {}
            renderLeaderboard();
        }
        function renderLeaderboard() {
            loadLeaderboard();
            let el = document.getElementById('lb-list');
            if (!el) return;
            let medals = ['🥇','🥈','🥉','4.','5.'];
            el.innerHTML = leaderboard.length === 0 ? '<div style="color:#555;text-align:center;font-size:13px">ჯერ შედეგი არ არის</div>' :
                leaderboard.map((s, i) => `<div class="lb-entry"><span class="lb-name">${medals[i]} ${i === 0 ? 'შენ' : 'მოთამაშე'}</span><span class="lb-score">${s}მ</span></div>`).join('');
        }

        try { 
            highScore = parseInt(localStorage.getItem('chainClimbHighScore')) || 0; 
            savedCheckpointScore = parseInt(localStorage.getItem('chainClimbSaveScore'));
            checkpointLives = parseInt(localStorage.getItem('chainClimbSaveLives')) || 0;
            energy = parseInt(localStorage.getItem('chainClimbEnergy')) || 0;
            document.getElementById('energy-count').innerText = energy;
            if (!isNaN(savedCheckpointScore) && checkpointLives > 0) {
                let rb = document.getElementById('resume-btn'); rb.style.display = 'inline-block'; rb.innerText = `გაგრძელება (${savedCheckpointScore}მ) - დაგრჩა ${checkpointLives}`;
            }
        } catch(e) {}
        document.getElementById('high-score').innerText = highScore;
        document.getElementById('m-record').innerText = "რეკორდი: " + highScore + " მ";
        renderLeaderboard();

        function setupTouchControls() {
            let btnS = document.getElementById('touch-shoot');
            let btnF = document.getElementById('touch-fly');
            
            function addTouch(el, onStart, onEnd) {
                el.addEventListener('touchstart', e => { e.preventDefault(); onStart(); el.classList.add('pressed'); }, {passive:false});
                el.addEventListener('touchend', e => { e.preventDefault(); onEnd(); el.classList.remove('pressed'); }, {passive:false});
                el.addEventListener('touchcancel', e => { onEnd(); el.classList.remove('pressed'); }, {passive:false});
                el.addEventListener('mousedown', e => { onStart(); el.classList.add('pressed'); });
                el.addEventListener('mouseup', e => { onEnd(); el.classList.remove('pressed'); });
            }
            
            addTouch(btnS, () => { initAudio(); shootProjectile(); }, () => {});
            addTouch(btnF, () => { initAudio(); activateFlight(); }, () => {});
            
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                document.getElementById('touch-controls').style.pointerEvents = 'all';
            }
        }
        setupTouchControls();

        // ========== ეკრანის შეხება = ხტომა ==========
        // ნებისმიერ ადგილას შეხება ხტომას იწვევს (გარდა ღილაკებისა)
        document.addEventListener('touchstart', function(e) {
            if (!gameActive || isPaused) return;
            // თუ შეხება მოხდა touch-controls-ზე, იგნორირება
            let tc = document.getElementById('touch-controls');
            for (let t of e.changedTouches) {
                let el = document.elementFromPoint(t.clientX, t.clientY);
                if (tc && (tc === el || tc.contains(el))) continue;
                // ეკრანის შეხება = ხტომა
                initAudio();
                player.jump();
                break;
            }
        }, {passive: true});

        // ========== გაიროსკოპი = მარჯვენა/მარცხენა ==========
        let gyroEnabled = false;
        let gyroTiltX = 0; // -1 (მარცხნივ) ... +1 (მარჯვნივ)
        const GYRO_DEADZONE = 3;   // გრადუსი – ამ ზონაში არ მოძრაობს
        const GYRO_MAX     = 25;   // გრადუსი – სრული სიჩქარე

        function handleOrientation(e) {
            if (!gameActive || isPaused) return;
            // gamma: -90..+90, გვერდზე გადახრა
            let gamma = e.gamma || 0;
            // deadzone
            if (Math.abs(gamma) < GYRO_DEADZONE) {
                gyroTiltX = 0;
            } else {
                let sign = gamma > 0 ? 1 : -1;
                let abs = Math.abs(gamma) - GYRO_DEADZONE;
                let range = GYRO_MAX - GYRO_DEADZONE;
                gyroTiltX = sign * Math.min(1, abs / range);
            }
            // keys სტატუსი გაიროს მიხედვით
            if (gyroTiltX < -0.15) {
                keys['a'] = true;  keys['d'] = false;
            } else if (gyroTiltX > 0.15) {
                keys['d'] = true;  keys['a'] = false;
            } else {
                // გაიროს ღერძი ნეიტრალურია, ხელის ღილაკი არ უნდა გადათიშოს
                if (!touchLeft)  keys['a'] = false;
                if (!touchRight) keys['d'] = false;
            }
        }

        // iOS 13+ მოითხოვს ნებართვას
        function requestGyro() {
            if (typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(resp => {
                        if (resp === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation, true);
                            gyroEnabled = true;
                            document.getElementById('gyro-btn').style.display = 'none';
                        }
                    }).catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleOrientation, true);
                gyroEnabled = true;
                document.getElementById('gyro-btn').style.display = 'none';
            }
        }

        // auto-try Android / older browsers (no permission needed)
        if (typeof DeviceOrientationEvent !== 'undefined' &&
            typeof DeviceOrientationEvent.requestPermission !== 'function') {
            window.addEventListener('deviceorientation', handleOrientation, true);
            gyroEnabled = true;
        }

        function selectCharacter(c) { selectedChar = c; document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('selected')); document.getElementById('btn-'+c).classList.add('selected'); }
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function toggleMute() { initAudio(); isMuted = !isMuted; document.getElementById('muteBtn').innerText = isMuted ? "ეფექტები: 🔇" : "ეფექტები: 🔊"; updateAmbientSounds(); }
        function updateHighScore() { if (score > highScore) { highScore = score; try { localStorage.setItem('chainClimbHighScore', highScore); } catch(e){} document.getElementById('high-score').innerText = highScore; } }
        
        function playSound(type) {
            if (isMuted || !audioCtx) return; const osc = audioCtx.createOscillator(), gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'jump') { osc.type = 'sine'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
            else if (type === 'rocket') { osc.type = 'square'; osc.frequency.setValueAtTime(70, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 2.5); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5); osc.start(); osc.stop(audioCtx.currentTime + 2.5); }
            else if (type === 'checkpoint') { osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.3); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
            else if (type === 'laser') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
            else if (type === 'combo') { 
                let notes = [400, 500, 600, 800];
                notes.forEach((freq, i) => {
                    let o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
                    o2.connect(g2); g2.connect(audioCtx.destination);
                    o2.type = 'triangle'; o2.frequency.value = freq * Math.min(2, 1 + comboCount * 0.1);
                    let t = audioCtx.currentTime + i * 0.06;
                    g2.gain.setValueAtTime(0.08, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                    o2.start(t); o2.stop(t + 0.15);
                });
            }
            else if (type === 'levelup') {
                let freqs = [500, 600, 750, 1000]; 
                freqs.forEach((freq, i) => {
                    let o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
                    o2.connect(g2); g2.connect(audioCtx.destination);
                    o2.type = 'sine'; o2.frequency.value = freq;
                    let t = audioCtx.currentTime + i * 0.1;
                    g2.gain.setValueAtTime(0.15, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                    o2.start(t); o2.stop(t + 0.3);
                });
            }
            else if (type === 'diamond') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(1200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(1800, audioCtx.currentTime + 0.15); gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15); osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            }
            else if (type === 'shoot') {
                osc.type = 'square'; osc.frequency.setValueAtTime(1000, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
            else if (type === 'explosion') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.2); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            }

            update(dt) {

                if (this.landSquish > 0) this.landSquish -= 0.08 * dt;
                let isSpace = score >= 500; let baseAccel = isSpace ? 1.0 : 1.5; 
                if (keys['a'] || keys['arrowleft'] || keys['ა']) this.vx -= baseAccel * dt; 
                else if (keys['d'] || keys['arrowright'] || keys['დ']) this.vx += baseAccel * dt; 
                else this.vx *= Math.pow(isSpace ? 0.90 : 0.75, dt); 
                let maxSpeed = 6; if (this.vx > maxSpeed) this.vx = maxSpeed; if (this.vx < -maxSpeed) this.vx = -maxSpeed; 
                if (isSpace && (Math.abs(this.vx) > 1 || Math.abs(this.vy) > 1)) this.trail.push({x: this.x + 17, y: this.y + 17, alpha: 0.8}); 
                for(let i = this.trail.length - 1; i >= 0; i--) { this.trail[i].alpha -= 0.05 * dt; if(this.trail[i].alpha <= 0) this.trail.splice(i, 1); }

        function spawnChunk(startY) {
            let lastX = 250;
            for(let i = 0; i < 20; i++) {
                let gap = 120 + Math.random() * 45; let nextY = startY - gap; 
                let skip = false; for (let cp of checkpoints) { if (Math.abs(nextY - cp.y) < 120) { skip = true; break; } }
                if (skip) { nextY -= 120; } startY = nextY;
                
                let pw = 45 + Math.random() * 40; 
                let px;
                let r = Math.random();
                if (r < 0.3) { px = lastX + (Math.random() * 80 - 40); } 
                else if (r < 0.6) { px = Math.random() * (500 - pw); } 
                else { px = lastX > 250 ? Math.random() * 200 : 300 - pw + Math.random() * 200; }
                px = Math.max(15, Math.min(485 - pw, px));
                lastX = px;

                let plat = new ChainPlatform(px, startY, pw);
                if (plat.hasSpikes && (lastSpawnedSpike || lastSpawnedBreakable)) { plat.hasSpikes = false; }
                lastSpawnedSpike = plat.hasSpikes; lastSpawnedBreakable = plat.isBreakable; platforms.push(plat);
                
                if (plat.type === 'normal' && !plat.hasSpikes && !plat.isBreakable && !plat.isCP) { 
                    if (Math.random() < 0.05) collectibles.push(new EnergyOrb(plat)); 
                }
            }
            highestY = startY;
        }

        function processDeathLogic() {

                checkpointLives--; try { localStorage.setItem('chainClimbSaveLives', checkpointLives); } catch(e) {}

                let rb = document.getElementById('resume-btn'); if (checkpointLives > 0) { rb.innerText = `გაგრძელება (${activeCheckpoint.score}მ) - დაგრჩა ${checkpointLives}`; } else { rb.style.display = 'none'; }

            } else {
                gameActive = false; updateHighScore(); 
                saveLeaderboard(score);
                try { localStorage.removeItem('chainClimbSaveScore'); localStorage.removeItem('chainClimbSaveLives'); } catch(e) {}

        function triggerDeath(r) {
            if (deathTimer > 0) return; deathReason = r;
            playSound('spring'); 
            for(let i=0; i<40; i++) bloodParticles.push(new BloodParticle(player.x + player.w/2, player.y + player.h/2)); 
            for(let i=0; i<8; i++) { screenSplatters.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: 30 + Math.random() * 60 }); } 
            deathTimer = 60; 
        }

        function updateLogic(dtRatio) {
            if (!gameActive || isPaused) return;
            if (deathTimer > 0) { deathTimer -= dtRatio; bloodParticles.forEach(bp => bp.update(dtRatio)); if (deathTimer <= 0) processDeathLogic(); return; }
            if (player.y < highestY + 500) spawnChunk(highestY);
            
            if (shootCooldown > 0) shootCooldown -= dtRatio;

            let cts = Math.floor((600 - (cameraY - 800)) / 40);
            if (cts >= nextAlienScore && nextAlienScore <= 2500 && nextAlienScore >= 1600) { let ay = 600 - (nextAlienScore * 40) - 50; let safe = true; for(let cp of checkpoints) { if (Math.abs(ay - cp.y) < 200) safe=false; } if(safe) alienPairs.push(new AlienPair(ay)); nextAlienScore += 40; }
            
            if (score >= 100 && highestCloudY > cameraY - 1000 && score < 500) { clouds.push(new Cloud(Math.random()*500, highestCloudY - Math.random()*150, 0.5+Math.random()*0.7, Math.floor(Math.random() * 3), Math.random() > 0.3)); highestCloudY -= 150; }
            if (score >= 20 && score <= 150 && Math.random() < 0.05) { birds.push(new Bird(cameraY - 100 - Math.random() * 300)); } else if (score > 150 && score <= 400 && Math.random() < 0.005) { birds.push(new Bird(cameraY - 100 - Math.random() * 300)); }
            if (score >= 150 && score <= 300 && Math.random() < 0.01) { balloons.push(new Balloon(cameraY - 100 - Math.random() * 200)); } else if (score > 300 && score <= 400 && Math.random() < 0.002) { balloons.push(new Balloon(cameraY - 100 - Math.random() * 200)); }
            if (score >= 50 && score <= 300 && Math.random() < 0.005) bgHelicopters.push(new BgHelicopter());
            if (score >= 300 && score <= 500 && Math.random() < 0.003) airplanes.push(new Airplane(cameraY - 100 - Math.random() * 600));
            
            if (score >= 1450 && Math.random() < 0.004) bgUfos.push(new BgUFO()); 
            if (score >= 1450 && Math.random() < 0.003) floatingAliens.push(new FloatingAlien());

            if (score >= 1200 && score - lastAsteroidScore >= 80) { asteroids.push(new Asteroid(cameraY - 100 - Math.random()*100)); lastAsteroidScore = score; }
            if (score >= 700 && score <= 950 && score - lastSatelliteScore >= 30) { satellites.push(new Satellite(cameraY - 100 - Math.random()*100)); lastSatelliteScore = score; }
            if (score >= 1000 && Math.random() < 0.05) shootingStars.push(new ShootingStar());
            if (score >= 1200 && !chakruloSpawned) { chakrulos.push(new Chakrulo(cameraY - 200)); chakruloSpawned = true; }
            if (score >= 800 && !capsuleSpawned) { capsules.push(new Capsule(cameraY - 300)); capsuleSpawned = true; } 
            
            if (score >= 500 && score <= 800) { 
                if (!rocketTimerStarted) { lastRocketSpawn = Date.now() - 28000; rocketTimerStarted = true; } 
                if (Date.now() - lastRocketSpawn >= 30000) { rockets.push(new Rocket(Math.random() * 300 + 100)); lastRocketSpawn = Date.now(); playSound('rocket'); } 
            } else rocketTimerStarted = false;

            for (let thr of levelFlashThresholds) {
                if (score >= thr && lastLevelFlash < thr) { lastLevelFlash = thr; triggerLevelFlash(); playSound('levelup'); }
            }

            player.update(dtRatio); checkpoints.forEach(cp => cp.update(dtRatio)); platforms.forEach(p => p.update(dtRatio)); clouds.forEach(c => c.update(dtRatio)); balloons.forEach(b => b.update(dtRatio)); rockets.forEach(r => r.update(dtRatio)); asteroids.forEach(a => a.update(dtRatio)); shootingStars.forEach(s => s.update(dtRatio)); satellites.forEach(s => s.update(dtRatio)); chakrulos.forEach(c => c.update(dtRatio)); capsules.forEach(c => c.update(dtRatio)); birds.forEach(bi => bi.update(dtRatio)); bgHelicopters.forEach(ba => ba.update(dtRatio)); airplanes.forEach(a => a.update(dtRatio)); alienPairs.forEach(a => a.update(dtRatio)); lasers.forEach(l => l.update(dtRatio)); bgUfos.forEach(u => u.update(dtRatio)); floatingAliens.forEach(f => f.update(dtRatio)); collectibles.forEach(c => c.update(dtRatio));
            energyParticles.forEach(p => p.update(dtRatio)); explosionParticles.forEach(ep => ep.update(dtRatio));
            
            energyParticles = energyParticles.filter(p => p.alpha > 0);
            explosionParticles = explosionParticles.filter(ep => ep.alpha > 0);

            projectiles.forEach(proj => {
                if (!proj.active) return;
                proj.update(dtRatio);
                
                let hitDist = proj.isStrong ? 45 : 25;
                birds.forEach(b => {
                    if (b.active && Math.abs(proj.x - b.x) < hitDist && Math.abs(proj.y - b.y) < hitDist) {
                        b.active = false; proj.active = false; spawnExplosion(b.x, b.y, b.color || '#fff'); score += 2; 
                    }
                });
                bgUfos.forEach(u => {
                    if (u.active && Math.abs(proj.x - u.x) < 40*u.scale + hitDist/2 && Math.abs(proj.y - u.y) < 20*u.scale + hitDist/2) {
                        u.active = false; proj.active = false; spawnExplosion(u.x, u.y, '#00ffcc'); score += 5;
                    }
                });
                floatingAliens.forEach(f => {
                    if (f.active && Math.abs(proj.x - f.x) < hitDist && Math.abs(proj.y - f.y) < hitDist) {
                        f.active = false; proj.active = false; spawnExplosion(f.x, f.y, f.color); score += 5;
                    }
                });
                alienPairs.forEach(a => {
                    if (a.active && proj.y < a.y + hitDist && proj.y > a.y - hitDist) {
                        if (proj.x < 60 + hitDist/2 || proj.x > canvas.width - 60 - hitDist/2) {
                            a.active = false; proj.active = false; spawnExplosion(proj.x < 60 ? 35 : canvas.width - 35, a.y, '#ff0000'); score += 10;
                        }
                    }
                });
            });

            lasers.forEach(l => { if (l.active && player.y < l.y + 2 && player.y + player.h > l.y - 2 && player.x < l.x + 15 && player.x + player.w > l.x - 15) triggerDeath('laser'); });
            
            collectibles.forEach(d => { 
                if (d.active && player.y + player.h > d.y - 15 && player.y < d.y + 15 && player.x + player.w > d.x - 15 && player.x < d.x + 15) { 
                    d.active = false; energy++; 
                    for (let i = 0; i < 8; i++) energyParticles.push(new EnergyParticle(d.x, d.y));
                    try { localStorage.setItem('chainClimbEnergy', energy); } catch(e) {} 
                    document.getElementById('energy-count').innerText = energy; 
                    playSound('diamond'); 
                } 
            });

            clouds = clouds.filter(c => c.y < cameraY + 2500); rockets = rockets.filter(r => r.y > cameraY - 1000); asteroids = asteroids.filter(a => a.y < cameraY + 2500); shootingStars = shootingStars.filter(s => s.alpha > 0); satellites = satellites.filter(s => s.x > -300 && s.x < canvas.width + 300); chakrulos = chakrulos.filter(c => c.x < canvas.width + 300); capsules = capsules.filter(c => c.y < cameraY + 2500); birds = birds.filter(b => b.x > -200 && b.x < canvas.width + 200 && b.active); bgHelicopters = bgHelicopters.filter(ba => ba.x > -200 && ba.x < canvas.width + 200); airplanes = airplanes.filter(a => a.x > -300 && a.x < canvas.width + 300); balloons = balloons.filter(b => b.y < cameraY + 2500); alienPairs = alienPairs.filter(a => a.y < cameraY + 1500 && a.y > cameraY - 1500 && a.active); lasers = lasers.filter(l => l.active); bgUfos = bgUfos.filter(u => u.x > -500 && u.x < canvas.width + 500 && u.active); floatingAliens = floatingAliens.filter(f => f.y > cameraY - 1500 && f.y < cameraY + 2500 && f.x > -200 && f.x < canvas.width + 200 && f.active); projectiles = projectiles.filter(p => p.active);

            // ფრენის ლოგიკა
            if (flightTimer > 0) {
                flightTimer -= dtRatio;
                player.vy = score >= 500 ? -12 : -15; // სტაბილური სიჩქარე მაღლა
                player.jumpsLeft = 2; // ფრენის მერეც რომ შეეძლოს ახტომა
                document.getElementById('flight-bar-fill').style.width = (flightTimer / 600 * 100) + '%';
                if (flightTimer <= 0) {
                    document.getElementById('flight-bar-container').style.display = 'none';
                }
                if (Math.random() < 0.4) energyParticles.push(new EnergyParticle(player.x + player.w/2, player.y + player.h));
            } else {
                let gravity = score >= 500 ? 0.35 : 0.65; player.vy += gravity * dtRatio; 
                if(player.vy > 22) player.vy = 22;
            }
            
            player.isOnMovingChain = false; 
            
            let prevY = player.y;
            let wasAir = player.jumpsLeft < 2;
            player.y += player.vy * dtRatio; 
            player.x += player.vx * dtRatio;
            
            if (player.x < 0) player.x = 0; if (player.x + player.w > 500) player.x = 500 - player.w;
            if (player.y < cameraY + 350) { cameraY += (player.y - 350 - cameraY) * 0.1 * dtRatio; } 
            else if (player.y > cameraY + 550) { cameraY += (player.y - 550 - cameraY) * 0.2 * dtRatio; }
            
            if (player.y > cameraY + 800 && deathTimer <= 0) { triggerDeath('fall'); }
            
            let landedThisFrame = false;
            platforms.forEach(p => { 
                if (Math.abs(p.y - player.y) > 1000) return;
                if (p.isBreakable && p.broken) return; 
                let pT = p.y; let pB = p.y + 15;
                if (player.x + player.w > p.x && player.x < p.x + p.width) {
                    let prevBot = prevY + player.h;
                    if (player.vy >= 0 && prevBot <= pT + 12 && player.y + player.h >= pT) {
                        if (p.hasSpikes && p.sActive) { triggerDeath('spikes'); }
                        else { 
                            let wasInAir = player.jumpsLeft < 2 || player.vy > 2;
                            player.y = pT - player.h; player.vy = 0; player.jumpsLeft = 2; 
                            if (wasInAir && !landedThisFrame) { player.onLand(); landedThisFrame = true; }
                            if (p.isBreakable && !p.broken) p.stepped = true; 
                            if (p.type === 'moving' && !p.isRoof) { player.x += p.vx * dtRatio; player.isOnMovingChain = true; } 
                        }
                    } else if (player.vy < 0 && prevY >= pB - 12 && player.y <= pB) {
                        player.y = pB; player.vy = 1; 
                    }
                }
            });
            
            let currentHeight = Math.floor((600 - player.y) / 40);
            score = Math.max(score, currentHeight); 
            document.getElementById('score').innerText = currentHeight < 0 ? 0 : currentHeight;
            updateHighScore(); 
            updateAmbientSounds();
            updateCombo(dtRatio);
            updateJumpIndicator();
            updateProgressBar();
            
            let nearSpike = false;
            platforms.forEach(p => {
                if (p.hasSpikes && p.sActive && Math.abs(p.y - (player.y + player.h)) < 80 && Math.abs(p.x + p.width/2 - (player.x + player.w/2)) < 100) nearSpike = true;
            });
            spikeWarningAlpha = nearSpike ? Math.min(1, spikeWarningAlpha + 0.1 * dtRatio) : Math.max(0, spikeWarningAlpha - 0.05 * dtRatio);
            document.getElementById('spike-warning').style.opacity = spikeWarningAlpha * 0.6;
        }

        function drawRender() {
            ctx.clearRect(0, 0, 500, 750); drawBackground(); ctx.save(); ctx.translate(0, -cameraY); 
            drawPlanets(); bgUfos.forEach(u => u.draw()); floatingAliens.forEach(f => f.draw()); airplanes.forEach(ba => ba.draw()); bgHelicopters.forEach(ba => ba.draw()); shootingStars.forEach(s => s.draw()); asteroids.forEach(a => a.draw()); clouds.forEach(c => c.draw()); balloons.forEach(b => b.draw()); birds.forEach(bi => bi.draw()); satellites.forEach(s => s.draw()); chakrulos.forEach(c => c.draw()); capsules.forEach(c => c.draw()); rockets.forEach(r => r.draw());
            
            checkpoints.forEach(cp => cp.draw()); platforms.forEach(p => { if (Math.abs(p.y - cameraY) < 1500) p.draw(); }); collectibles.forEach(c => { if (c.active && Math.abs(c.y - cameraY) < 1500) c.draw(); }); alienPairs.forEach(a => a.draw()); lasers.forEach(l => l.draw());
            
            energyParticles.forEach(p => p.draw());
            projectiles.forEach(p => p.draw());
            explosionParticles.forEach(ep => ep.draw());
            
            if (deathTimer <= 0) player.draw(); 
            bloodParticles.forEach(bp => bp.draw());
            
            if (checkpointMessageTimer > 0) { let t = (activeCheckpoint && activeCheckpoint.score >= 1550) ? "10-მაგი ჩეკპოინტი გააქტიურდა!" : "შენ გაქვს ერთჯერადი ჩეკპოინთი!"; ctx.fillStyle = '#ff3333'; ctx.font = 'bold 20px Segoe UI'; ctx.textAlign = 'center'; ctx.shadowBlur = 10; ctx.shadowColor = '#000'; ctx.fillText(t, 250, cameraY + 150); ctx.fillStyle = '#fff'; ctx.font = '16px Segoe UI'; ctx.fillText(`დაგრჩა ${checkpointLives} შანსი`, 250, cameraY + 175); checkpointMessageTimer--; }
            if (respawnMessageTimer > 0) { ctx.fillStyle = '#00ffcc'; ctx.font = 'bold 24px Segoe UI'; ctx.textAlign = 'center'; ctx.shadowBlur = 10; ctx.shadowColor = '#000'; ctx.fillText("შანსი გამოყენებულია!", 250, cameraY + 150); ctx.fillStyle = '#fff'; ctx.font = '16px Segoe UI'; ctx.fillText(`დაგრჩა ${checkpointLives} შანსი`, 250, cameraY + 175); respawnMessageTimer--; }
            
            // "გიმირა ვოვო!" მხოლოდ მესისთვის
            if (deathTimer > 0 && selectedChar === 'messi') {
                ctx.save();
                let txtY = player.y - 20 - (60 - deathTimer) * 1.5; 
                ctx.font = 'bold 28px Segoe UI';
                ctx.textAlign = 'center';
                ctx.strokeStyle = '#000'; 
                ctx.lineWidth = 4;
                ctx.strokeText("გიმირა ვოვო!", player.x + player.w/2, txtY);
                ctx.fillStyle = '#fff';
                ctx.fillText("გიმირა ვოვო!", player.x + player.w/2, txtY);
                ctx.restore();
            }

            ctx.restore(); 
            if (deathTimer > 0) { ctx.save(); screenSplatters.forEach(sp => { let g = ctx.createRadialGradient(sp.x, sp.y, 0, sp.x, sp.y, sp.size); g.addColorStop(0, 'rgba(180, 0, 0, 0.8)'); g.addColorStop(1, 'rgba(180, 0, 0, 0)'); ctx.fillStyle = g; ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.size, 0, Math.PI*2); ctx.fill(); }); ctx.fillStyle = 'rgba(255, 0, 0, 0.15)'; ctx.fillRect(0,0,500,750); ctx.restore(); }
        }

        function gameLoop(timestamp) {
            if (!gameActive || isPaused) return; if (!timestamp) timestamp = performance.now();
            deltaTime = timestamp - lastTime; lastTime = timestamp; if (deltaTime > 100) deltaTime = TARGET_FRAME_TIME;
            let dtRatio = deltaTime / TARGET_FRAME_TIME; updateLogic(dtRatio); drawRender();
            if (gameActive && !isPaused) { animationId = requestAnimationFrame(gameLoop); }
        }

        window.startGame = function() { try { localStorage.removeItem('chainClimbSaveScore'); localStorage.removeItem('chainClimbSaveLives'); } catch(e) {} savedCheckpointScore = null; checkpointLives = 0; document.getElementById('share-btn').style.display = 'none'; teleportToSpace(0); };
        window.resumeGame = function() { isPaused = false; document.getElementById('pause-menu').style.display = 'none'; lastTime = performance.now(); requestAnimationFrame(gameLoop); };
        window.quitGame = function() { isPaused = false; gameActive = false; document.getElementById('pause-menu').style.display = 'none'; document.getElementById('menu').style.display = 'flex'; };

        window.addEventListener('keydown', e => { 
            let k = e.key.toLowerCase(); keys[k] = true; 
            if(['w','წ',' ','arrowup'].includes(k)) { initAudio(); player.jump(); }
            if (k === 'y' || k === 'ყ') { initAudio(); shootProjectile(); }
            if (k === 'f' || k === 'ფ') { initAudio(); activateFlight(); }
            if (k === 'escape') { if (gameActive && !isPaused) { isPaused = true; document.getElementById('pause-menu').style.display = 'flex'; } else if (gameActive && isPaused) { resumeGame(); } }
        });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
    </script>
</body>
</html>
